<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akce | Klídek a pohoda gaming</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12141c">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="css/styl.css?v=20">
</head>
<body>

  <header class="hlavicka">
    <div class="obsah hlavicka-vnitrek">
      <a href="index.html" class="logo">🎮 Klídek <span>a pohoda</span></a>
      <nav class="menu">
        <a href="clenska-sekce.html">Přehled</a>
        <a href="akce.html" class="aktivni">Akce</a>
        <a href="chat.html">Chat</a>
        <a href="prispevky.html">Příspěvky</a>
        <a href="ankety.html">Ankety</a>
        <button class="tlacitko-nenapadne" onclick="odhlasit()">Odhlásit</button>
      </nav>
    </div>
  </header>

  <main class="clenska-stranka">
    <div class="obsah">
      <h1>📅 Akce guildy</h1>

      <div class="panel-blok nastenka-banner">
        <img src="assets/vypravy-web.jpg" alt="Tabule s nápisem Výpravy" class="nastenka-banner-obrazek" width="500" height="500">
        <p><strong>Tady se dozvíš o všech větších akcích.</strong><br>
        Účast není povinná, ani když se přihlásíš.<br>
        Zapsal ses, ale nemůžeš dorazit? Dej to partě vědět.</p>
      </div>

      <div class="panel-blok" id="panel-nova-akce" style="display:none;">
        <h2>Naplánovat novou akci</h2>
        <form id="formular-akce">
          <label for="nazev-akce">Název akce</label>
          <input type="text" id="nazev-akce" maxlength="100" required
                 placeholder="Např. Páteční herní večer">

          <label for="datum-akce">Datum a čas</label>
          <input type="datetime-local" id="datum-akce" required>

          <label for="popis-akce">Popis (nepovinné)</label>
          <textarea id="popis-akce" rows="3"
                    placeholder="Co se bude hrát, kde se sejdeme na Discordu…"></textarea>

          <div id="chyba-akce" class="chyba"></div>
          <button type="submit" class="tlacitko">Vytvořit akci</button>
        </form>
      </div>

      <div class="panel-blok">
        <h2>Nadcházející akce</h2>
        <div id="seznam-akci">
          <div class="skeleton-karta"><div class="skeleton-radek stredni"></div><div class="skeleton-radek kratky"></div><div class="skeleton-radek dlouhy"></div></div>
          <div class="skeleton-karta"><div class="skeleton-radek stredni"></div><div class="skeleton-radek kratky"></div></div>
        </div>
      </div>

      <div class="panel-blok">
        <h2>Proběhlé akce</h2>
        <div id="seznam-minulych">
          <div class="skeleton-radek stredni"></div>
          <div class="skeleton-radek kratky"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="js/config.js?v=16"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/klient.js?v=16"></script>
  <script src="js/akce.js?v=16"></script>
  <script src="js/pwa.js?v=1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie | Klídek a pohoda gaming</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12141c">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="css/styl.css?v=31">
</head>
<body>

  <header class="hlavicka">
    <div class="obsah hlavicka-vnitrek">
      <a href="index.html" class="logo">🎮 Klídek <span>a pohoda</span></a>
      <button class="menu-prepinac" onclick="prepniMenu(this)" aria-label="Menu">☰</button>
      <nav class="menu">
        <a href="clenska-sekce.html">Přehled</a>
        <a href="akce.html">Akce</a>
        <a href="chat.html">Chat</a>
        <a href="prispevky.html">Příspěvky</a>
        <a href="ankety.html">Ankety</a>
        <a href="vyzvy.html">Výzvy</a>
        <a href="galerie.html" class="aktivni">Galerie</a>
        <button class="tlacitko-nenapadne" onclick="odhlasit()">Odhlásit</button>
      </nav>
    </div>
  </header>

  <main class="clenska-stranka">
    <div class="obsah">
      <h1>🖼️ Galerie momentek</h1>
      <p class="poznamka" style="margin-top:-8px; margin-bottom: 20px;">
        Síň slávy guildy. Nahraj screenshot z výpravy a přidej ho k ostatním.</p>

      <div class="panel-blok">
        <h2>Přidat momentku</h2>
        <form id="formular-momentka">
          <label for="momentka-soubor">Obrázek</label>
          <input type="file" id="momentka-soubor" accept="image/*" required>

          <label for="momentka-popisek">Popisek (nepovinné)</label>
          <input type="text" id="momentka-popisek" maxlength="200" placeholder="Co se na obrázku děje?">

          <div id="chyba-momentka" class="chyba"></div>
          <button type="submit" id="tlacitko-pridat-momentku" class="tlacitko">Přidat momentku</button>
        </form>
      </div>

      <div id="galerie-mrizka" class="galerie-mrizka">
        <div class="skeleton-karta"><div class="skeleton-radek stredni"></div></div>
        <div class="skeleton-karta"><div class="skeleton-radek stredni"></div></div>
        <div class="skeleton-karta"><div class="skeleton-radek stredni"></div></div>
      </div>

    </div>
  </main>

  <script src="js/config.js?v=20"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/klient.js?v=24"></script>
  <script src="js/galerie.js?v=2"></script>
  <script src="js/pwa.js?v=1"></script>
</body>
</html>

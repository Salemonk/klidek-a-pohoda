<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení | Klídek a pohoda gaming</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12141c">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="css/styl.css?v=28">
</head>
<body>

  <header class="hlavicka">
    <div class="obsah hlavicka-vnitrek">
      <a href="index.html" class="logo">🎮 Klídek <span>a pohoda</span></a>
      <nav class="menu">
        <a href="index.html">← Zpět na web</a>
      </nav>
    </div>
  </header>

  <main class="prihlaseni-obal">
    <div class="prihlaseni-karta">
      <img src="assets/gamepad-web.jpg" alt="" class="prihlaseni-obrazek" width="400" height="400">
      <h1>Přihlášení člena</h1>

      <div id="chyba" class="chyba"></div>

      <form id="prihlasovaci-formular">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="username">

        <label for="heslo">Heslo</label>
        <input type="password" id="heslo" required autocomplete="current-password">

        <button type="submit" class="tlacitko" id="tlacitko-prihlasit">Přihlásit se</button>
      </form>

      <p class="poznamka">Nemáš účet? Ozvi se správci guildy o pozvánku.
      Dostal jsi pozvánkový kód? <a href="registrace.html">Zaregistruj se</a>.</p>
      <p class="poznamka">Zapomněl jsi heslo? Nic se neděje, ozvi se správci guildy
      a on ti nastaví nové. Pak si ho v členské sekci můžeš změnit na vlastní.</p>
    </div>
  </main>

  <script src="js/config.js?v=20"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/klient.js?v=22"></script>
  <script src="js/prihlaseni.js?v=20"></script>
  <script src="js/pwa.js?v=1"></script>
</body>
</html>

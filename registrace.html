<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrace | Klídek a pohoda gaming</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="css/styl.css?v=13">
</head>
<body>

  <header class="hlavicka">
    <div class="obsah hlavicka-vnitrek">
      <a href="index.html" class="logo">🎮 Klídek <span>a pohoda</span></a>
      <nav class="menu">
        <a href="index.html">← Zpět na web</a>
      </nav>
    </div>
  </header>

  <main class="prihlaseni-obal">
    <div class="prihlaseni-karta">
      <img src="assets/gamepad-web.jpg" alt="" class="prihlaseni-obrazek" width="400" height="400">
      <h1>Registrace člena</h1>

      <div id="chyba" class="chyba"></div>

      <form id="registracni-formular">
        <label for="kod">Pozvánkový kód</label>
        <input type="text" id="kod" required placeholder="KP-XXXX-XXXX" autocomplete="off">

        <label for="prezdivka">Přezdívka (uvidí ji ostatní členové)</label>
        <input type="text" id="prezdivka" maxlength="30" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="username">

        <label for="heslo">Heslo (aspoň 6 znaků)</label>
        <input type="password" id="heslo" minlength="6" required autocomplete="new-password">

        <label for="heslo-znovu">Heslo ještě jednou</label>
        <input type="password" id="heslo-znovu" minlength="6" required autocomplete="new-password">

        <button type="submit" class="tlacitko" id="tlacitko-registrovat">Zaregistrovat se</button>
      </form>

      <p class="poznamka">Registrace funguje jen s pozvánkou od správce guildy.
      Už máš účet? <a href="prihlaseni.html">Přihlas se</a>.</p>
    </div>
  </main>

  <script src="js/config.js?v=12"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/klient.js?v=12"></script>
  <script src="js/registrace.js?v=12"></script>
</body>
</html>
